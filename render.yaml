services:
  - type: web
    name: telegram-save-bot
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: MONGO_URI
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: PORT
        value: 10000
